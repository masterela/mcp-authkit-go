name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release — leave blank to use the version from VERSION"
        required: false
        default: ""

permissions:
  contents: write # create GitHub Release

jobs:
  release:
    name: Test, tag-verify & release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=v$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./... -race

      - name: Build (sanity check — Go modules aren't published, just tagged)
        run: go build ./...

      - name: Pre-warm the Go module proxy cache
        run: |
          GOPROXY=proxy.golang.org go list -m github.com/masterela/mcp-authkit-go@${{ steps.tag.outputs.value }} || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
